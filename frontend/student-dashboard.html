<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - BIT Event Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">BIT Event Management</h1>

            <!-- Mobile menu button -->
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="#events" onclick="showTab('events')"><i class="fas fa-calendar"></i> Events</a></li>
                <li><a href="#registrations" onclick="showTab('registrations')"><i class="fas fa-ticket-alt"></i> My
                        Registrations</a></li>
                <li><a href="#" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard">
        <div class="container">
            <div class="welcome-section">
                <h1>Welcome, <span id="student-name"></span>!</h1>
                <p>Browse and register for upcoming events</p>
            </div>

            <div class="dashboard-tabs">
                <button class="tab-btn active" onclick="showTab('events')">Available Events</button>
                <button class="tab-btn" onclick="showTab('registrations')">My Registrations</button>
            </div>

            <div id="events-tab" class="tab-content active">
                <h2>Upcoming Events</h2>
                <div id="events-container" class="events-grid">
                    <!-- Events will be loaded here -->
                </div>
            </div>

            <div id="registrations-tab" class="tab-content">
                <h2>My Registrations</h2>
                <div id="registrations-container" class="registrations-list">
                    <!-- Registrations will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Register for Event</h2>
            <form id="registration-form">
                <input type="hidden" id="event-id" name="eventId">

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="studentId" name="studentId" required>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" required>
                </div>

                <div class="form-group">
                    <label for="year">Year</label>
                    <select id="year" name="year" required>
                        <option value="">Select Year</option>
                        <option value="1st Year">1st Year</option>
                        <option value="2nd Year">2nd Year</option>
                        <option value="3rd Year">3rd Year</option>
                        <option value="4th Year">4th Year</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="semester">Semester</label>
                    <select id="semester" name="semester" required>
                        <option value="">Select Semester</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
        </div>
    </div>

    <script src="js/student.js"></script>
    
</body>

</html>
