<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BIT Event Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">BIT Event Management</h1>

            <!-- Mobile menu button -->
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="#events" onclick="showTab('events')"><i class="fas fa-calendar"></i> Events</a></li>
                <li><a href="#manage" onclick="showTab('manage')"><i class="fas fa-cog"></i> Manage</a></li>
                <li><a href="#statistics" onclick="showTab('statistics')"><i class="fas fa-chart-bar"></i> Statistics</a></li>
                <li><a href="#" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard">
        <div class="container">
            <div class="welcome-section">
                <h1>Admin Dashboard</h1>
                <p>Welcome, <span id="admin-name"></span>!</p>
            </div>

            <div class="dashboard-tabs">
                <button class="tab-btn active" onclick="showTab('events')">All Events</button>
                <button class="tab-btn" onclick="showTab('manage')">Manage Events</button>
                <button class="tab-btn" onclick="showTab('stats')">Statistics</button>
            </div>

            <div id="events-tab" class="tab-content active">
                <h2>All Events</h2>
                <div id="events-container" class="events-grid">
                    <!-- Events will be loaded here -->
                </div>
            </div>

            <div id="manage-tab" class="tab-content">
                <h2>Manage Events</h2>
                <button class="btn btn-primary" onclick="openAddEventModal()">Add New Event</button>
                <div id="manage-events-container" class="manage-events-list">
                    <!-- Events management list will be loaded here -->
                </div>
            </div>

            <div id="stats-tab" class="tab-content">
                <h2>Event Statistics</h2>
                <div class="stats-cards">
                    <div class="stat-card">
                        <h3>Total Events</h3>
                        <p id="total-events">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Registrations</h3>
                        <p id="total-registrations">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Upcoming Events</h3>
                        <p id="upcoming-events">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Event Modal -->
    <div id="event-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Add New Event</h2>
            <form id="event-form">
                <input type="hidden" id="event-id" name="eventId">

                <div class="form-group">
                    <label for="title">Event Title</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group">
                    <label for="time">Time</label>
                    <input type="time" id="time" name="time" required>
                </div>

                <div class="form-group">
                    <label for="venue">Venue</label>
                    <input type="text" id="venue" name="venue" required>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department" name="department" required>
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Business">Business</option>
                        <option value="Arts">Arts</option>
                        <option value="Science">Science</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="organizer">Organizer</label>
                    <input type="text" id="organizer" name="organizer" required>
                </div>

                <div class="form-group">
                    <label for="maxParticipants">Maximum Participants</label>
                    <input type="number" id="maxParticipants" name="maxParticipants" min="1" required>
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="upcoming">Upcoming</option>
                        <option value="ongoing">Ongoing</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>

                <div id="manage-tab" class="tab-content">
                    <div class="manage-header">
                        <h2><i class="fas fa-calendar-alt"></i> Manage Events</h2>
                        <button class="btn-add-event" onclick="openAddEventModal()">
                            <i class="fas fa-plus-circle"></i>
                            Add New Event
                        </button>
                    </div>

                    <div id="manage-events-container" class="manage-events-grid">
                        <!-- Events will be loaded dynamically -->
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Save Event</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
